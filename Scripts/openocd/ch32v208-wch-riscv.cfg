adapter driver wlinke
adapter speed 6000
transport select sdi

# CH32V208 firmware in this repository is flashed through the 0x08000000 alias
# to avoid mixing the execution alias with OpenOCD's probed flash bank window.
# Note: current WCH OpenOCD still misidentifies this target as 160KB flash.
# Repo-side cfg/image fixes help diagnostics only; writes at or above 0x08028000
# still need driver-level support in `wch_riscv`, so `make flash` remains default.
wlink_set_address 0x08000000

set _CHIPNAME wch_riscv
sdi newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x00001

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME.0 wch_riscv -chain-position $_TARGETNAME
$_TARGETNAME.0 configure -work-area-phys 0x20000000 -work-area-size 10000 -work-area-backup 1

set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME wch_riscv 0x08000000 0 0 0 $_TARGETNAME.0

echo "Ready for Remote Connections"
